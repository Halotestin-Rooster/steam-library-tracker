<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Library Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #020b3d 0%, #1d4e9b 100%);
            min-height: 100vh;
            color: #fff;
        }
        .overlay {
            background-color: rgba(0, 0, 0, 0.78);
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            cursor: pointer;
        }
        .card:hover {
            transform: translateY(-8px) scale(1.03);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
        }
        .card-img-top {
            height: 180px;
            object-fit: cover;
        }
        .nav-link {
            color: rgba(255,255,255,0.8) !important;
        }
        .nav-link:hover {
            color: #fff !important;
        }
        .disabled-overlay {
            pointer-events: none;
            opacity: 0.65;
        }
    </style>
</head>
<body>
    <div class="overlay">
        <nav class="navbar navbar-expand-lg navbar-dark bg-transparent py-3">
            <div class="container-fluid">
                <a class="navbar-brand" href="home.html">Game Library Tracker</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link active" href="index.html">Tracker</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <div class="container">
            <div class="row gy-4">
                <div class="col-12">
                    <div class="card bg-dark bg-opacity-75 text-white mb-4">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <h4>Welcome to Game Library Tracker</h4>
                                    <p>Search and select games you've played to calculate your rating.</p>
                                </div>
                            </div>
                            <div class="mb-3">
                                <input type="search" id="search" class="form-control" placeholder="Search games...">
                            </div>
                            <div class="row" id="gameList"></div>
                            <div class="text-center mt-4">
                                <button id="calculateBtn" class="btn btn-primary">Calculate My Rating</button>
                            </div>
                            <div id="result" class="alert alert-info mt-4 text-center" style="display: none;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Initialize variables
        let playedGames = JSON.parse(localStorage.getItem('playedGames') || '[]');
        let searchTimer = null;
        let games = [];

        const searchInput = document.getElementById('search');
        const gameList = document.getElementById('gameList');
        const calculateBtn = document.getElementById('calculateBtn');
        const resultDiv = document.getElementById('result');

async function fetchGameLibrary(search = '') {
    try {
        const response = await fetch('/.netlify/functions/games', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: search })
        });

        const data = await response.json();

        games = data.map(game => ({
            id: game.id,
            name: game.name,
            score: game.rating ?? 0,
            image: game.cover?.url
                ? game.cover.url.replace('//', 'https://')
                : '',
            released: game.first_release_date
                ? new Date(game.first_release_date * 1000).toLocaleDateString()
                : 'Unknown'
        }));

        renderGames(search);

    } catch (error) {
        console.error('Fetch error:', error);
    }
}

        function createGameCard(game) {
            const col = document.createElement('div');
            col.className = 'col-md-6 mb-3';

            const card = document.createElement('div');
            card.className = 'card';

            const img = document.createElement('img');
            img.src = game.image || 'https://via.placeholder.com/180x95?text=No+Image';
            img.className = 'card-img-top';
            img.alt = game.name;
            card.appendChild(img);

            const body = document.createElement('div');
            body.className = 'card-body';

            const label = document.createElement('label');
            label.className = 'form-check-label d-block';
            label.htmlFor = 'game-' + game.id;
            label.innerHTML = `<strong>${game.name}</strong><br><small class="text-muted">Score: ${game.score || 'N/A'}</small><br><small class="text-muted">${game.released}</small>`;
            check.type = 'checkbox';
            check.className = 'form-check-input me-2';
            check.id = 'game-' + game.id;
            check.value = game.id;
            check.checked = playedGames.includes(game.id);
            check.addEventListener('change', () => {
                if (check.checked) {
                    if (!playedGames.includes(game.id)) {
                        playedGames.push(game.id);
                    }
                } else {
                    const index = playedGames.indexOf(game.id);
                    if (index !== -1) playedGames.splice(index, 1);
                }
                localStorage.setItem('playedGames', JSON.stringify(playedGames));
                updateRatingMessage();
            });

            const checkWrapper = document.createElement('div');
            checkWrapper.className = 'form-check';
            checkWrapper.appendChild(check);
            checkWrapper.appendChild(label);

            body.appendChild(checkWrapper);
            card.appendChild(body);
            col.appendChild(card);
            return col;
        }

        function renderGames(filter = '') {
            gameList.innerHTML = '';
            const filtered = games.filter(game => game.name.toLowerCase().includes(filter.toLowerCase()));
            filtered.forEach(game => {
                gameList.appendChild(createGameCard(game));
            });
        }

        function updateRatingMessage() {
            if (playedGames.length === 0) {
                resultDiv.style.display = 'none';
                return;
            }
            const selectedGames = games.filter(game => playedGames.includes(game.id) && game.score);
            const scoreSum = selectedGames.reduce((sum, game) => sum + game.score, 0);
            const avgScore = selectedGames.length ? scoreSum / selectedGames.length : 0;
            const rating = getRatingText(avgScore);
            resultDiv.innerHTML = `You've marked ${playedGames.length} games played. Average score: ${avgScore.toFixed(1)} / 100. Rating: <strong>${rating}</strong>`;
            resultDiv.className = 'alert alert-info mt-4 text-center';
            resultDiv.style.display = 'block';
        }

        function getRatingText(avgScore) {
            if (avgScore < 75) return 'Novice';
            if (avgScore < 80) return 'Beginner';
            if (avgScore < 85) return 'Intermediate';
            if (avgScore < 90) return 'Advanced';
            if (avgScore < 95) return 'Expert';
            if (avgScore < 98) return 'Master';
            return 'God Level';
        }

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.trim();
            if (query.length >= 2) {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => fetchGameLibrary(query), 300);
            } else {
                fetchGameLibrary('');
            }
        });

        calculateBtn.addEventListener('click', () => {
            updateRatingMessage();
        });
        fetchGameLibrary();
    </script>
</body>
</html>
